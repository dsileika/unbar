name: CI

on:
  push:
    branches: [main]
  pull_request:

# Actions are pinned to commit SHAs (not tags) so a hijacked tag can't change
# what runs. Dependabot (github-actions) proposes SHA bumps with the version in
# the comment. upload-artifact@v5.0.0 still ships a Node 20 runtime, so opt it
# into Node 24 here; remove once it publishes a Node 24 release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint (web-ext)
        run: npm run lint

      - name: Build packages
        run: npm run dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: unbar-${{ github.sha }}
          path: |
            dist/chrome
            dist/firefox
            dist/artifacts/*.zip
          if-no-files-found: error
