name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (web-ext)
        run: npm run lint

      - name: Build packages
        run: npm run dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: unbar-${{ github.sha }}
          path: |
            dist/chrome
            dist/firefox
            dist/artifacts/*.zip
          if-no-files-found: error
