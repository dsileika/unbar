name: CI

on:
  push:
    branches: [main]
  pull_request:

# Run the bundled JS actions on Node 24 (they ship with Node 20, which GitHub is
# deprecating). This is GitHub's documented opt-in for the transition.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (web-ext)
        run: npm run lint

      - name: Build packages
        run: npm run dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unbar-${{ github.sha }}
          path: |
            dist/chrome
            dist/firefox
            dist/artifacts/*.zip
          if-no-files-found: error
