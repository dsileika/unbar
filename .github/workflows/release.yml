name: Release

# Push a version tag (e.g. v1.0.0) to build the packages and publish a
# GitHub Release with downloadable Chrome and Firefox zips attached.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build per-browser folders
        run: npm run build

      - name: Package zips
        run: |
          mkdir -p dist/release
          ( cd dist/chrome  && zip -qr "../release/unbar-chrome-${GITHUB_REF_NAME}.zip"  . )
          ( cd dist/firefox && zip -qr "../release/unbar-firefox-${GITHUB_REF_NAME}.zip" . )
          ls -la dist/release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Re-runnable: if a release already exists for this tag, replace it
          # (keeps the tag — we manage that via git).
          gh release delete "$GITHUB_REF_NAME" --yes 2>/dev/null || true
          gh release create "$GITHUB_REF_NAME" dist/release/*.zip \
            --title "Unbar $GITHUB_REF_NAME" \
            --generate-notes
