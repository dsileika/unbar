<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: dark; }
    body {
      width: 240px;
      margin: 0;
      padding: 14px 14px 12px;
      background: #16161a;
      color: #f2f2f2;
      font: 13px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    h1 {
      margin: 0 0 2px;
      font-size: 14px;
      font-weight: 700;
    }
    .hint {
      margin: 0 0 12px;
      font-size: 11px;
      color: #9a9aa2;
    }
    .modes { display: flex; flex-direction: column; gap: 6px; }
    button.mode {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #2c2c33;
      border-radius: 8px;
      background: #1e1e24;
      color: #f2f2f2;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    button.mode:hover { background: #26262e; }
    button.mode.active {
      border-color: #6c8cff;
      background: #232a44;
    }
    button.mode .check { opacity: 0; color: #6c8cff; }
    button.mode.active .check { opacity: 1; }
    .setting {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #2c2c33;
    }
    .setting-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .setting-row label { font-weight: 600; }
    .setting-row .right { display: flex; align-items: center; gap: 8px; }
    .setting-row .val { color: #6c8cff; font-variant-numeric: tabular-nums; }
    .setting .desc { margin: 0 0 8px; font-size: 11px; color: #9a9aa2; }
    input[type="range"] { width: 100%; accent-color: #6c8cff; }
    button.reset {
      border: 1px solid #2c2c33;
      background: #1e1e24;
      color: #9a9aa2;
      font: inherit;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 6px;
      cursor: pointer;
    }
    button.reset:hover { background: #26262e; color: #f2f2f2; }
    .scope {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      padding: 8px 10px;
      border: 1px solid #2c2c33;
      border-radius: 8px;
      background: #1a1a20;
    }
    .scope .label { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .scope .label b { font-size: 12px; }
    .scope .host {
      font-size: 11px;
      color: #9a9aa2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* toggle switch */
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; flex: none; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .track {
      position: absolute; inset: 0; cursor: pointer;
      background: #2c2c33; border-radius: 999px; transition: background 0.15s;
    }
    .switch .track::before {
      content: ""; position: absolute; height: 14px; width: 14px; left: 3px; top: 3px;
      background: #f2f2f2; border-radius: 50%; transition: transform 0.15s;
    }
    .switch input:checked + .track { background: #6c8cff; }
    .switch input:checked + .track::before { transform: translateX(14px); }
    .footer {
      margin-top: 12px;
      font-size: 11px;
      color: #9a9aa2;
    }
    kbd {
      background: #2c2c33;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <h1>Unbar</h1>
  <p class="hint">Remove the black bars from any video.</p>

  <div class="scope">
    <span class="label">
      <b>Only this site</b>
      <span class="host" id="siteHost">all sites</span>
    </span>
    <label class="switch">
      <input type="checkbox" id="siteToggle" />
      <span class="track"></span>
    </label>
  </div>

  <div class="modes" id="modes"></div>

  <div class="setting">
    <div class="setting-row">
      <label for="fill">Smart fill</label>
      <span class="right">
        <span class="val" id="fillVal">100%</span>
        <button type="button" class="reset" id="fillReset" title="Reset to 100%">Reset</button>
      </span>
    </div>
    <p class="desc">In Smart mode: 0% keeps the original (bars), 100% fills the
      frame. In between is a partial zoom.</p>
    <input type="range" id="fill" min="0" max="100" step="5" value="100" />
  </div>

  <p class="footer">Tip: hold <kbd>Ctrl</kbd> and scroll over a video to switch modes.</p>

  <script src="popup.js"></script>
</body>
</html>
